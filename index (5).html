        <div style={{ padding: "12px 16px", background: "rgba(0,0,0,0.2)", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>

              </div>
              <Lane zones={d.stbd} />
            </div>
            <div style={{ fontSize: 8, fontWeight: 600, color: "var(--muted)", writingMode: "vertical-rl", display: "flex", alignItems: "center", padding: "0 2px", textTransform: "uppercase", letterSpacing: 1.5, flexShrink: 0, transform: "rotate(180deg)", fontFamily: "var(--sans)" }}>STBD</div>

export default function App() {

  const [openFree, setOpenFree] = useState(null);
  const [openSpec, setOpenSpec] = useState(null);
  const [activeDeck, setActiveDeck] = useState(9); // index 9 = Deck 5 (your cabin)

  const tabs = [
    { id: "dinners",   label: "🍽️ Dinners" },

    { id: "soda",      label: "🍹 Zero Proof" },

  return (
    <div style={{ fontFamily: "var(--sans)", background: "var(--navy)", minHeight: "100vh", color: "var(--text)", maxWidth: 480, margin: "0 auto" }}>
      <GlobalStyles />

      {/* HEADER */}
      <div style={{
        background: "linear-gradient(160deg, #0f2040 0%, #0a1628 60%)",
        borderBottom: "1px solid var(--border)",
        padding: "24px 20px 18px",
        position: "relative", overflow: "hidden",
      }}>
        {/* decorative lines */}
        <div style={{ position: "absolute", inset: 0, backgroundImage: "repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,168,76,0.04) 40px, rgba(201,168,76,0.04) 41px)", pointerEvents: "none" }} />

          <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 16 }}>Complete Guide · Verified March 2026</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {[
              { l: "Cabin", v: "M218 · Deck 5 · AFT" },
              { l: "Guests", v: "Neff Family × 3" },
              { l: "Free Lobster", v: "Night 5 🦞" },
              { l: "WiFi", v: "Premium ✓" },
            ].map(b => (
              <div key={b.l} style={{ background: "var(--mist)", border: "1px solid var(--border)", borderRadius: 8, padding: "5px 11px" }}>
                <div style={{ fontSize: 8, color: "var(--muted)", letterSpacing: 1, textTransform: "uppercase", marginBottom: 1 }}>{b.l}</div>
                <div style={{ fontSize: 11, fontWeight: 600, color: "var(--gold2)" }}>{b.v}</div>
              </div>
            ))}

        </div>
      </div>

      {/* TABS */}
      <div className="tab-bar" style={{
        display: "flex", background: "var(--navy2)",
        borderBottom: "1px solid var(--border)", overflowX: "auto",
        position: "sticky", top: 0, zIndex: 10,
      }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: "1 0 auto", padding: "13px 8px",
            background: tab === t.id ? "var(--mist)" : "transparent",
            borderBottom: tab === t.id ? "2px solid var(--gold)" : "2px solid transparent",
            border: "none", borderBottom: tab === t.id ? "2px solid var(--gold)" : "2px solid transparent",
            cursor: "pointer", fontFamily: "var(--sans)",

          }}>

      {tab === "specialty" && <SpecialTab openSpec={openSpec} setOpenSpec={setOpenSpec} />}

}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
